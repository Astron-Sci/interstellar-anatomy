<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星际解剖站 · 找出外星伪人</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e1a;
  --panel:#141c2e;
  --panel-border:#2a3a5a;
  --accent:#00f0a0;
  --accent-dim:#007a5a;
  --warn:#f0a030;
  --danger:#f03050;
  --text:#e0e8f0;
  --text-dim:#6a7a8a;
  --heart:#f03050;
  --gold:#f0d030;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Courier New',monospace;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:10px;
  overflow-x:hidden;
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 2px,transparent 2px,transparent 4px);
  pointer-events:none;
  z-index:99;
}
.game-container{
  width:100%;
  max-width:520px;
  background:var(--panel);
  border:2px solid var(--panel-border);
  border-radius:8px;
  padding:14px;
  position:relative;
  box-shadow:0 0 30px rgba(0,240,160,0.05),inset 0 0 30px rgba(0,0,0,0.3);
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 0 8px 0;
  border-bottom:1px solid var(--panel-border);
  flex-wrap:wrap;
  gap:4px;
}
.title{
  font-size:13px;font-weight:bold;color:var(--accent);
  text-shadow:0 0 8px rgba(0,240,160,0.3);letter-spacing:1px;
}
.status-bar{display:flex;align-items:center;gap:8px;font-size:12px}
.hearts{color:var(--heart);font-size:16px;letter-spacing:2px}
.hearts .lost{opacity:0.2}
.score{color:var(--gold)}
.round{color:var(--text-dim)}

/* Patient */
.patient-area{
  display:flex;align-items:center;gap:14px;
  padding:10px 0;min-height:110px;
}
.patient-canvas-wrap{
  flex-shrink:0;width:78px;height:104px;
  background:rgba(0,0,0,0.3);border:1px solid var(--panel-border);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.patient-canvas-wrap canvas{display:block}
.patient-canvas-wrap::after{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,240,160,0.02) 2px,rgba(0,240,160,0.02) 4px);
  pointer-events:none;
}
.patient-info{flex:1;min-width:0}
.patient-info .name{font-size:15px;color:var(--accent);margin-bottom:2px}
.patient-info .meta{font-size:11px;color:var(--text-dim);line-height:1.6}
.patient-info .tag{
  display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;margin-top:4px;
}
.tag-human{background:rgba(0,240,160,0.15);color:var(--accent);border:1px solid rgba(0,240,160,0.3)}
.tag-alien{background:rgba(240,48,80,0.15);color:var(--danger);border:1px solid rgba(240,48,80,0.3)}

/* Tools */
.tools-row{
  display:flex;gap:5px;padding:8px 0;
}
.tool-btn{
  flex:1;min-width:52px;padding:7px 2px;
  background:rgba(0,0,0,0.3);border:1px solid var(--panel-border);border-radius:4px;
  color:var(--text-dim);font-family:inherit;font-size:10px;cursor:pointer;
  text-align:center;transition:all 0.2s;line-height:1.2;
  position:relative;
}
.tool-btn:hover{background:rgba(0,240,160,0.08);border-color:var(--accent-dim);color:var(--text)}
.tool-btn:active{transform:scale(0.95)}
.tool-btn .icon{display:block;font-size:16px;margin-bottom:1px}
.tool-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}
.tool-btn.used{border-color:var(--accent-dim);background:rgba(0,240,160,0.06)}
.tool-btn.used::after{content:'✓';position:absolute;top:-2px;right:-2px;font-size:9px;color:var(--accent)}

/* Report area */
.report-area{
  min-height:80px;max-height:260px;overflow-y:auto;
  background:rgba(0,0,0,0.2);border:1px solid var(--panel-border);border-radius:4px;
  padding:8px;margin:4px 0;
}
.report-area::-webkit-scrollbar{width:3px}
.report-area::-webkit-scrollbar-track{background:rgba(0,0,0,0.2)}
.report-area::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:2px}
.report-placeholder{
  text-align:center;color:var(--text-dim);font-size:12px;padding:24px 0;
}

/* Report card */
.report-card{
  background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;
  padding:8px 10px;margin-bottom:6px;animation:slideUp 0.25s ease-out;
}
.report-card:last-child{margin-bottom:0}
.report-card .rc-header{
  font-size:10px;color:var(--accent-dim);margin-bottom:3px;
  display:flex;justify-content:space-between;
}
.report-card .rc-line{
  display:flex;justify-content:space-between;align-items:baseline;
  padding:2px 0;
}
.report-card .rc-label{font-size:13px;color:var(--text)}
.report-card .rc-value{
  font-size:16px;font-weight:bold;color:var(--accent);
}

.report-card .rc-desc{font-size:10px;color:var(--text-dim);line-height:1.4;margin-top:4px;padding-top:4px;border-top:1px dashed rgba(255,255,255,0.05)}

/* Submit & Decision */
.action-bar{
  display:flex;gap:8px;padding:6px 0;
}
.submit-btn{
  flex:1;padding:10px;border:1px solid var(--accent-dim);border-radius:4px;
  background:rgba(0,240,160,0.08);color:var(--accent);
  font-family:inherit;font-size:13px;cursor:pointer;letter-spacing:1px;
  transition:all 0.2s;
}
.submit-btn:hover{background:rgba(0,240,160,0.2)}
.submit-btn:disabled{opacity:0.3;cursor:not-allowed}
.decision-row{
  display:none;gap:10px;padding:6px 0;
}
.decision-row.show{display:flex}
.decision-btn{
  flex:1;padding:10px;border:none;border-radius:4px;
  font-family:inherit;font-size:14px;font-weight:bold;cursor:pointer;
  transition:all 0.2s;letter-spacing:2px;
}
.decision-btn:active{transform:scale(0.95)}
.decision-btn.release{
  background:rgba(0,240,160,0.15);color:var(--accent);
  border:1px solid var(--accent-dim);
}
.decision-btn.release:hover{background:rgba(0,240,160,0.25)}
.decision-btn.detain{
  background:rgba(240,48,80,0.15);color:var(--danger);
  border:1px solid rgba(240,48,80,0.3);
}
.decision-btn.detain:hover{background:rgba(240,48,80,0.25)}
.decision-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}

/* Feedback */
.feedback{
  padding:8px 10px;border-radius:4px;font-size:12px;line-height:1.6;margin-top:4px;display:none;
}
.feedback.show{display:block;animation:slideUp 0.3s ease-out}
.feedback.correct{background:rgba(0,240,160,0.1);border:1px solid rgba(0,240,160,0.3);color:var(--accent)}
.feedback.wrong{background:rgba(240,48,80,0.1);border:1px solid rgba(240,48,80,0.3);color:var(--danger)}
.feedback .fb-icon{font-size:18px;margin-right:6px}
.feedback .fb-title{font-weight:bold}
.feedback .fb-detail{color:var(--text-dim);font-size:11px;margin-top:2px}

/* Overlay screens */
.overlay-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:320px;gap:14px;text-align:center;
}
.overlay-screen h1{font-size:22px;color:var(--accent);text-shadow:0 0 12px rgba(0,240,160,0.3);letter-spacing:2px}
.overlay-screen .subtitle{font-size:13px;color:var(--text-dim);line-height:1.7}
.big-btn{
  padding:12px 36px;background:rgba(0,240,160,0.12);
  border:1px solid var(--accent-dim);border-radius:4px;color:var(--accent);
  font-family:inherit;font-size:16px;cursor:pointer;letter-spacing:3px;transition:all 0.2s;
}
.big-btn:hover{background:rgba(0,240,160,0.25);box-shadow:0 0 20px rgba(0,240,160,0.1)}
.gameover-score{font-size:28px;color:var(--gold)}
.gameover-stats{font-size:12px;color:var(--text-dim);line-height:1.6}

/* Handbook modal */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;
  justify-content:center;align-items:center;padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  background:var(--panel);border:2px solid var(--accent-dim);border-radius:8px;
  max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:16px;position:relative;
}
.modal-title{font-size:14px;color:var(--accent);margin-bottom:12px;text-align:center}
.modal-close{
  position:absolute;top:8px;right:12px;
  background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;font-family:inherit;
}
.modal-close:hover{color:var(--text)}
.handbook-cat{margin-bottom:14px}
.handbook-cat h3{font-size:12px;color:var(--accent);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--panel-border)}
.handbook-item{display:flex;justify-content:space-between;font-size:11px;padding:3px 6px;color:var(--text)}
.handbook-item .h-val{color:var(--warn);font-weight:bold}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-track{background:rgba(0,0,0,0.2)}
.modal::-webkit-scrollbar-thumb{background:var(--accent-dim);border-radius:2px}

/* Handbook accordion */
.hb-cat{margin-bottom:6px;border:1px solid var(--panel-border);border-radius:4px;overflow:hidden}
.hb-cat h3{font-size:12px;color:var(--accent);padding:8px 10px;margin:0;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.2);user-select:none;transition:background 0.15s}
.hb-cat h3:hover{background:rgba(0,240,160,0.05)}
.hb-cat h3 .hb-toggle{font-size:10px;color:var(--accent-dim);transition:transform 0.2s}
.hb-cat.open h3 .hb-toggle{transform:rotate(90deg)}
.hb-cat .hb-items{display:none;padding:6px 8px}
.hb-cat.open .hb-items{display:block}

/* FAB */
.fab{
  position:fixed;bottom:20px;right:20px;width:44px;height:44px;border-radius:50%;
  background:var(--panel);border:1px solid var(--accent-dim);color:var(--accent);
  font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 15px rgba(0,240,160,0.1);z-index:50;transition:all 0.2s;
}
.fab:hover{background:rgba(0,240,160,0.15);transform:scale(1.1)}
.continue-btn{
  display:block;width:100%;padding:10px;margin-top:8px;
  background:rgba(0,240,160,0.12);border:1px solid var(--accent-dim);border-radius:4px;
  color:var(--accent);font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:3px;
  transition:all 0.2s;
}
.continue-btn:hover{background:rgba(0,240,160,0.25)}
.compare-table{font-size:11px;line-height:1.8;padding:6px 8px;margin:4px 0;background:rgba(0,0,0,0.15);border-radius:3px;border:1px solid rgba(255,255,255,0.04)}
.compare-table .ct-item{display:flex;justify-content:space-between;padding:2px 0}
.compare-table .ct-item .ct-part{color:var(--text)}
.compare-table .ct-item .ct-found{color:var(--danger)}
.compare-table .ct-item .ct-correct{color:var(--accent)}

/* Animations */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.shake{animation:shake 0.35s}

@media(max-width:420px){
  .game-container{padding:10px}
  .title{font-size:12px}
  .tool-btn{font-size:9px;min-width:44px;padding:5px 1px}
  .tool-btn .icon{font-size:14px}
  .patient-canvas-wrap{width:64px;height:86px}
  .report-area{max-height:200px}
  .decision-btn{font-size:13px;padding:8px}
}
</style>
</head>
<body>

<div class="game-container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="title">🏥 星际检疫站</div>
    <div class="status-bar">
      <span class="hearts" id="heartsDisplay"></span>
      <span class="score" id="scoreDisplay">0</span>
      <span class="round" id="roundDisplay">第1轮</span>
    </div>
  </div>

  <!-- Start Screen -->
  <div id="startScreen" class="overlay-screen">
    <h1>找出外星伪人</h1>
    <div class="subtitle">
      地球遭外星人入侵<br>
      他们伪装成人类混迹其中<br>
      但解剖结构存在破绽<br><br>
      你是一名检疫医生<br>
      用各项检查来揪出外星人！
    </div>
    <button class="big-btn" onclick="startGame()">开 始 执 勤</button>
    <div style="font-size:10px;color:var(--text-dim);margin-top:6px">📖 右下角按钮可查阅解剖参考手册</div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameoverScreen" class="overlay-screen" style="display:none">
    <h1 style="color:var(--danger)">🛸 检疫失败</h1>
    <div class="subtitle">你已被撤职查办</div>
    <div class="gameover-score" id="finalScore">0</div>
    <div class="gameover-stats" id="finalStats"></div>
    <button class="big-btn" onclick="startGame()">重 新 执 勤</button>
  </div>
  <!-- Victory Screen -->
  <div id="victoryScreen" class="overlay-screen" style="display:none">
    <h1 style="color:var(--gold)">🏆 检疫通关！</h1>
    <div class="subtitle">今日10名患者全部检疫完毕<br>你成功守护了地球的安全</div>
    <div class="gameover-score" id="victoryScore">0</div>
    <div class="gameover-stats" id="victoryStats"></div>
    <button class="big-btn" onclick="startGame()">继 续 执 勤</button>
  </div>

  <!-- Game Area -->
  <div id="gameArea" style="display:none">
    <!-- Patient -->
    <div class="patient-area" id="patientArea">
      <div class="patient-canvas-wrap">
        <canvas id="patientCanvas" width="72" height="96"></canvas>
      </div>
      <div class="patient-info">
        <div class="name" id="patientName">--</div>
        <div class="meta" id="patientMeta">--</div>
        <div class="tag tag-human" id="patientTag">⏳ 待检查</div>
      </div>
    </div>

    <!-- Tools (always available during examination) -->
    <div class="tools-row" id="toolsRow"></div>

    <!-- Accumulated Report Area -->
    <div class="report-area" id="reportArea">
      <div class="report-placeholder">🔍 请选择检查项目</div>
    </div>

    <!-- Submit Judgment -->
    <div class="action-bar" id="actionBar">
      <button class="submit-btn" id="submitBtn" disabled onclick="submitJudgment()">📋 综合判断</button>
    </div>

    <!-- Decision (shown after submit) -->
    <div class="decision-row" id="decisionRow">
      <button class="decision-btn release" id="releaseBtn" onclick="decide('release')">🟢 放行</button>
      <button class="decision-btn detain"  id="detainBtn"  onclick="decide('detain')">🔴 扣押</button>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>
    <button class="continue-btn" id="continueBtn" onclick="handleContinue()" style="display:none">确 定</button>
  </div>
</div>

<!-- Handbook FAB -->
<button class="fab" onclick="toggleHandbook()" title="解剖学手册">📖</button>
<div class="modal-overlay" id="handbookModal">
  <div class="modal">
    <button class="modal-close" onclick="toggleHandbook()">✕</button>
    <div class="modal-title">📖 正常人体解剖学参考手册</div>
    <div id="handbookContent"></div>
  </div>
</div>

<script>
// ============================================================
//  ANATOMY DATABASE
// ============================================================
const EXAM_DATA = {
  xray: {
    name: 'X光骨骼', icon: '🦴',
    items: [
      { part:'肋骨', normal:24, unit:'根', nd:'人类有12对肋骨（7真肋+5假肋），共24根。', ad:'患者只有{0}根肋骨——外星人的胸廓与人类不同！' },
      { part:'椎骨总数', normal:33, unit:'块', nd:'脊柱由33块椎骨组成：颈7+胸12+腰5+骶5+尾4（成年后骶尾椎融合，但计数仍为33）。', ad:'患者有{0}块椎骨——外星脊柱节段总数与人类不同！' },
      { part:'颈椎', normal:7, unit:'块', nd:'人类颈椎恒为7块（C1-C7），这是哺乳动物的保守特征——长颈鹿也是7块！', ad:'患者有{0}块颈椎——颈椎数目异常，不是人类！' },
      { part:'胸椎', normal:12, unit:'块', nd:'人类胸椎为12块（T1-T12），与12对肋骨一一对应。', ad:'患者有{0}块胸椎——胸椎数不对，肋骨也会跟着少！' },
      { part:'腰椎', normal:5, unit:'块', nd:'人类腰椎为5块（L1-L5），承重最大。某些人可有腰椎骶化或骶椎腰化导致数目改变。', ad:'患者有{0}块腰椎——腰椎数目异常，脊柱承重结构不同！' },
      { part:'指骨（双手）', normal:28, unit:'块', nd:'每只手14块指骨。拇指2块（近节+远节），其余四指各3块，双手共28块。', ad:'患者双手只有{0}块指骨——手指关节分节数目异常！' },
      { part:'腕骨（双手）', normal:16, unit:'块', nd:'每只手8块腕骨：舟骨、月骨、三角骨、豌豆骨、大多角骨、小多角骨、头状骨、钩骨。双手16块。', ad:'患者双手有{0}块腕骨——腕骨排列方式异于人类！' },
      { part:'牙齿', normal:32, unit:'颗', ageMap:{0:20,12:28,18:32}, nd:'人类{age}岁牙齿约{at}颗（儿童乳牙20颗，换牙期混合，成人恒牙28~32颗）。', ad:'患者有{0}颗牙齿——对{age}岁来说齿式异常！' },
      { part:'全身骨骼', normal:206, unit:'块', ageMap:{0:270,12:206}, nd:'人类{age}岁全身骨骼约{at}块（儿童未融合约270块，成人206块）。', ad:'患者全身只有{0}块骨骼——对{age}岁来说数目异常！' },
      { part:'骶椎', normal:5, unit:'块', nd:'骶骨由5块骶椎（S1-S5）融合而成，成年后融合为1块骶骨。', ad:'患者骶骨由{0}块骶椎融合——骶骨分节数目异常！' },
      { part:'颅骨（不含听小骨）', normal:23, unit:'块', nd:'颅骨共23块。脑颅8块（额/顶2/颞2/枕/蝶/筛）+ 面颅15块。不含听小骨。', ad:'患者颅骨有{0}块——颅骨分块方式异于人类！' },
      { part:'听小骨（双侧）', normal:6, unit:'块', nd:'每侧中耳有3块听小骨（锤骨+砧骨+镫骨），双侧共6块，是人体最小的骨骼。', ad:'患者双侧听小骨共{0}块——中耳传音结构异常！' },
      { part:'掌骨（双手）', normal:10, unit:'块', nd:'每只手5块掌骨，分别对应5根手指的基部，双手共10块。', ad:'患者双手有{0}块掌骨——手掌骨骼数目异常！' },
      { part:'跗骨（双足）', normal:14, unit:'块', nd:'每足7块跗骨：距骨、跟骨、足舟骨、骰骨、内侧/中间/外侧楔骨。双足共14块。', ad:'患者双足有{0}块跗骨——足弓结构异常！' },

function drawPatient(ctx, w, h, colors){
  ctx.clearRect(0,0,w,h);
  const skin=colors.skin||'#d4a574', hair=colors.hair||'#3a2a1a',
        shirt=colors.shirt||'#2a6a9a', pants=colors.pants||'#3a4a5a',
        shoes=colors.shoes||'#2a2a2a';
  const px=6;
  function sp(x,y,c){ctx.fillStyle=c;ctx.fillRect(x*px,y*px,px,px)}
  const head=[[4,0],[5,0],[6,0],[7,0],[3,1],[4,1],[5,1],[6,1],[7,1],[8,1],[3,2],[4,2],[5,2],[6,2],[7,2],[8,2],[4,3],[5,3],[6,3],[7,3]];
  const neck=[[5,4],[6,4]];
  const body=[[4,5],[5,5],[6,5],[7,5],[3,6],[4,6],[5,6],[6,6],[7,6],[8,6],[3,7],[4,7],[5,7],[6,7],[7,7],[8,7]];
  const armsL=[[2,5],[2,6],[2,7]], armsR=[[9,5],[9,6],[9,7]];
  const legs=[[4,8],[5,8],[6,8],[7,8],[4,9],[5,9],[6,9],[7,9],[4,10],[5,10],[6,10],[7,10]];
  const hs=colors.hairStyle||0;
  if(hs===0){for(let i=3;i<=8;i++)sp(i,0,hair);sp(2,1,hair);sp(9,1,hair)}
  else if(hs===1){for(let i=2;i<=9;i++)sp(i,0,hair);for(let i=3;i<=8;i++)sp(i,1,hair)}
  else{for(let i=3;i<=8;i++){sp(i,0,hair);sp(i,1,hair)}sp(2,1,hair);sp(9,1,hair)}
  for(const [x,y]of head)sp(x,y,skin);
  ctx.fillStyle='#fff';ctx.fillRect(4*px,2*px,px,px);ctx.fillRect(7*px,2*px,px,px);
  ctx.fillStyle='#222';ctx.fillRect(5*px,2*px,px,px);ctx.fillRect(6*px,2*px,px,px);
  ctx.fillStyle='#c07060';ctx.fillRect(5*px,3*px,2*px,px/2);
  for(const [x,y]of neck)sp(x,y,skin);
  for(const [x,y]of body)sp(x,y,shirt);
  for(const [x,y]of armsL)sp(x,y,shirt);
  for(const [x,y]of armsR)sp(x,y,shirt);
  for(const [x,y]of legs)sp(x,y,pants);
  sp(4,11,shoes);sp(5,11,shoes);sp(6,11,shoes);sp(7,11,shoes);
}

  const sC=['#2a6a9a','#6a3a8a','#8a4a3a','#2a7a5a','#6a5a2a','#3a5a7a','#7a3a5a','#5a7a3a','#2a5a7a','#7a5a3a'];
  const pC=['#3a4a5a','#2a3a4a','#4a5a3a','#3a3a4a','#4a3a3a','#2a4a3a'];

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getAlienValue(item){
  const key=PART_ALIEN_KEY[item.part];
  if(!key) return item.normal;
  const options=ALIEN_VALUES[key];
  if(!options) return item.normal;
  const norm=item.normal;
  const filtered=options.filter(v=>v!=norm);
  if(filtered.length===0) return options[0];
  return pick(filtered);
}

let state = {
  hearts:3, score:0, round:0, active:false,
  patientType:null,    // 'human'|'alien'
  globalUsedItems:[],  // cross-round item tracking for variety
  reports:[],          // findings for current patient [{toolKey,item,isAlien}]

};

// ============================================================

// ============================================================
function renderHearts(){
  const el=document.getElementById('heartsDisplay');
  let h='';
  for(let i=0;i<3;i++)h+=i<state.hearts?'❤️':'<span class="lost">❤️</span>';
  el.innerHTML=h;
}
function renderStatus(){
  document.getElementById('scoreDisplay').textContent=state.score;
  document.getElementById('roundDisplay').textContent='第'+(state.round+1)+'轮';
  renderHearts();
}

function renderTools(){
  const row=document.getElementById('toolsRow');
  row.innerHTML='';
  for(const[key,cat]of Object.entries(EXAM_DATA)){
    const btn=document.createElement('button');
    btn.className='tool-btn';
    btn.dataset.tool=key;
    btn.innerHTML=`<span class="icon">${cat.icon}</span>${cat.name}`;
    btn.onclick=()=>useTool(key);
    row.appendChild(btn);
  }
}

function updateToolStates(){
  document.querySelectorAll('.tool-btn').forEach(btn=>{
    const key=btn.dataset.tool;
    const used=state.reports.some(r=>r.toolKey===key);
    btn.classList.toggle('used',used);
    btn.disabled=used || state.judging;
  });
}

function addReportCard(toolKey,item,isAlien){
  const area=document.getElementById('reportArea');
  const placeholder=area.querySelector('.report-placeholder');
  if(placeholder) placeholder.remove();

  const norm = item._ageNorm !== undefined ? item._ageNorm : item.normal;
  const val = isAlien ? item._alienVal : norm;
  const valStr = item.unit ? val+item.unit : val;
  const cat = EXAM_DATA[toolKey];

  const card=document.createElement('div');
  card.className='report-card';
  card.innerHTML=`
    <div class="rc-header">
      <span>${cat.icon} ${cat.name}</span>
      <span>—</span>
    </div>
    <div class="rc-line">
      <span class="rc-label">${item.part}</span>
      <span class="rc-value">${valStr}</span>
    </div>
    `;
  area.appendChild(card);
  area.scrollTop=area.scrollHeight;

  // Enable submit button once we have at least one report
  document.getElementById('submitBtn').disabled=false;
}

function startGame(){
  state.hearts=3; state.score=0; state.round=0;
  state.globalUsedItems=[]; state.active=true;

  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameoverScreen').style.display='none';
  document.getElementById('victoryScreen').style.display='none';
  document.getElementById('gameArea').style.display='block';

  renderTools(); renderStatus(); renderHandbook();
  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').innerHTML='';
  nextPatient();
}

  document.getElementById('submitBtn').disabled=true;
  document.getElementById('submitBtn').style.display='';
  document.getElementById('releaseBtn').disabled=false;
  document.getElementById('detainBtn').disabled=false;
}

function getAgeLabel(a){return a<6?'婴幼儿':a<12?'儿童':a<18?'青少年':a<60?'成人':'老年'}

function nextPatient(){
  if(!state.active) return;
  state.round++;
  state.patientType=Math.random()<0.5?'human':'alien';
  state.patientAge = rand(3,75);
  state.alienAbnormalTools=[];
  if(state.patientType==='alien'){
    const keys=Object.keys(EXAM_DATA);
    state.alienAbnormalTools=[pick(keys)];
    if(Math.random()<0.4) state.alienAbnormalTools.push(pick(keys.filter(k=>k!==state.alienAbnormalTools[0])));
  }

  const name=randomName(), job=pick(JOBS), age=state.patientAge;
  const ageLabel=getAgeLabel(age);
  document.getElementById('patientName').textContent='患者 #'+String(state.round).padStart(3,'0')+' · '+name;
  document.getElementById('patientMeta').innerHTML='职业：'+job+'<br>年龄：'+age+'岁（'+ageLabel+'）';
  const tag=document.getElementById('patientTag');
  tag.className='tag tag-human'; tag.textContent='⏳ 待检查 · '+(state.round)+'/10';

  const canvas=document.getElementById('patientCanvas'), ctx=canvas.getContext('2d');
  drawPatient(ctx,72,96,randomColors());

  renderStatus();
  resetForPatient();
  updateToolStates();
  document.getElementById('patientArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function useTool(toolKey){
  if(!state.active || state.judging) return;

  // Already used this tool on this patient?
  if(state.reports.some(r=>r.toolKey===toolKey)) return;

  const cat=EXAM_DATA[toolKey];
  if(!cat||!cat.items.length) return;

  // Pick item
  let available=cat.items.filter((_,i)=>{
    return !state.globalUsedItems.includes(toolKey+'_'+i);
  });
  if(available.length===0){
    state.globalUsedItems=state.globalUsedItems.filter(k=>!k.startsWith(toolKey+'_'));
    available=[...cat.items];
  }
  const item=pick(available);
  const idx=cat.items.indexOf(item);
  state.globalUsedItems.push(toolKey+'_'+idx);

  // Alien value
  // Compute age-adjusted normal
  let ageNorm = item.normal;
  let ageNormStr = item.normal;
  if(item.ageMap){
    const ages = Object.keys(item.ageMap).map(Number).sort((a,b)=>b-a);
    for(const minAge of ages){
      if(state.patientAge >= minAge){ ageNorm = item.ageMap[minAge]; break; }
    }
    ageNormStr = ageNorm;
  }
  item._ageNorm = ageNorm;

  const isAlien=state.patientType==='alien';
  const isAbnormal=isAlien && state.alienAbnormalTools.includes(toolKey);
  if(isAbnormal){
    if(item.ageMap){
      const otherVals=Object.values(item.ageMap).filter(v=>v!=ageNorm);
      item._alienVal=otherVals.length?pick(otherVals):ageNorm;
    }else if(typeof ageNorm==='number'){
      item._alienVal=getAlienValue(item);
    }else if(item.part==='脊髓末端位置'){
      const otherVals=Object.values(item.ageMap||{}).filter(v=>v!=ageNorm);
      item._alienVal=otherVals.length?pick(otherVals):pick(ALIEN_VALUES.cordEnd);
    }else{
      item._alienVal=getAlienValue(item);
      if(!item._alienVal||item._alienVal===item.normal){
        const v=pick(ALIEN_VALUES[PART_ALIEN_KEY[item.part]]||[]);
        item._alienVal=v||'??';
      }
    }
  }else item._alienVal=undefined;

  // Show scanning feedback
  const area=document.getElementById('reportArea');
  area.innerHTML=`<div style="text-align:center;padding:14px 0;color:var(--accent);animation:pulse 0.6s infinite">🔍 ${cat.icon} ${cat.name}扫描中...</div>`;

  setTimeout(()=>{
    const isAbnormal=item._alienVal!==undefined;
    state.reports.push({toolKey,item,isAlien,isAbnormal});
    addReportCard(toolKey,item,isAbnormal);
    updateToolStates();
  }, 400);
}

function submitJudgment(){
  if(state.reports.length===0||state.judging) return;
  state.judging=true;

  document.getElementById('submitBtn').style.display='none';
  const row=document.getElementById('decisionRow');
  row.style.display='flex';
  // Force reflow then add class for animation
  void row.offsetWidth;
  row.classList.add('show');

  // Disable tool buttons
  updateToolStates();

  document.getElementById('decisionRow').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function decide(action){
  if(state.decisionMade) return;
  state.decisionMade=true;

  document.getElementById('releaseBtn').disabled=true;
  document.getElementById('detainBtn').disabled=true;

  // Determine correctness: ANY report being alien = patient is alien
  const isAlien=state.patientType==='alien';
  const correct=(action==='release'&&!isAlien)||(action==='detain'&&isAlien);

  // Build evidence summary
  const abnormalReports=state.reports.filter(r=>r.isAbnormal);

  // Build comparison table
  function compRow(rp){
    const normVal=(rp.item._ageNorm!==undefined?rp.item._ageNorm:rp.item.normal)+rp.item.unit;
    if(rp.isAbnormal){
      const foundVal=rp.item._alienVal+rp.item.unit;
      return '<div class="ct-item"><span class="ct-part">'+rp.item.part+'</span><span class="ct-found">'+foundVal+'</span><span class="ct-correct">← 正常应为 '+normVal+'</span></div>';
    }
    return '<div class="ct-item"><span class="ct-part">'+rp.item.part+'</span><span>'+normVal+'</span><span style="color:var(--accent-dim)">✓</span></div>';
  }

  if(correct){
    state.score++;
    let detail, extraHtml='';
    if(isAlien){
      extraHtml='<div class="compare-table">'+state.reports.map(compRow).join('')+'</div>';
      detail='成功识别外星人！已扣押。';
    }else{
      detail='所有检查项目正常，正常居民予以放行。';
    }
    showFeedback('correct',detail,extraHtml);
    const tag=document.getElementById('patientTag');
    if(isAlien){tag.className='tag tag-alien'; tag.textContent='👽 外星人 ✓ 已扣押'}
    else{tag.className='tag tag-human'; tag.textContent='🧑 正常居民 ✓ 已放行'}
  }else{
    state.hearts--;
    if(isAlien){
      const extraHtml='<div class="compare-table">'+state.reports.map(compRow).join('')+'</div>';
      showFeedback('wrong_escape','您放走了一个外星人！',extraHtml);
      document.getElementById('patientTag').className='tag tag-alien';
      document.getElementById('patientTag').textContent='👽 外星人 ✗ 已逃脱';
    }else{
      const extraHtml='<div class="compare-table">'+state.reports.map(compRow).join('')+'</div>';
      showFeedback('wrong_complaint','患者投诉您误诊！','该患者的检查结果全部正常。您扣押了一位无辜市民。'+extraHtml);
      document.getElementById('patientTag').className='tag tag-human';
      document.getElementById('patientTag').textContent='🧑 正常居民 ✗ 被误扣';
    }
  }

  renderStatus();

  // Show continue button instead of auto-advance
  document.getElementById('continueBtn').style.display='block';
  document.getElementById('continueBtn').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function handleContinue(){
  document.getElementById('continueBtn').style.display='none';
  if(state.hearts<=0){ gameOver(); return; }
  if(state.round>=10){ gameWin(); return; }
  state.judging=false;
  nextPatient();
}

function gameOver(){
  state.active=false;
  document.getElementById('gameArea').style.display='none';
  document.getElementById('gameoverScreen').style.display='flex';
  document.getElementById('finalScore').textContent='得分：'+state.score;
  document.getElementById('finalStats').innerHTML='检疫 '+state.round+' 人 / 10 人<br>成功识别 '+state.score+' 个外星人';
}

function gameWin(){
  state.active=false;
  document.getElementById('gameArea').style.display='none';
  document.getElementById('victoryScreen').style.display='flex';
  document.getElementById('victoryScore').textContent='得分：'+state.score;
  const heartsLeft = state.hearts;
  const bonus = heartsLeft === 3 ? '（满血通关！完美！）' : '（剩余 ❤️×'+heartsLeft+'）';
  document.getElementById('victoryStats').innerHTML='成功检疫 10/10 人<br>成功识别 '+state.score+' 个外星人 '+bonus;
}

function showFeedback(type,detail,extra){
  const el=document.getElementById('feedback');
  const icons={correct:'✅',wrong_complaint:'📋',wrong_escape:'🚨'};
  const titles={correct:'判断正确！',wrong_complaint:'投诉警告！',wrong_escape:'领导训斥！'};
  el.className='feedback show '+(type==='correct'?'correct':'wrong');
  el.innerHTML=`<div><span class="fb-icon">${icons[type]||''}</span><span class="fb-title">${titles[type]||''}</span></div>
    <div class="fb-detail">${detail}</div>
    ${extra?'<div class="fb-detail" style="color:var(--warn);margin-top:4px">'+extra+'</div>':''}`;
  if(type!=='correct'){
    const area=document.getElementById('reportArea');
    area.classList.add('shake');
    setTimeout(()=>area?.classList.remove('shake'),400);
  }
}

  const modal=document.getElementById('handbookModal');
  const isShow=modal.classList.contains('show');
  if(isShow){modal.classList.remove('show');return;}
  modal.classList.add('show');
  renderHandbook();
}

    ['🧬 遗传基因',['染色体数目','血型系统（常用）','血红蛋白亚基']],
    ['💪 肌肉系统',['前臂肌前群','前臂肌后群','手肌（单侧）','小腿三头肌','眼外肌（单侧）','咀嚼肌（双侧）','股四头肌（单侧）','大腿后群肌（单侧）','小腿前群肌（单侧）','小腿外侧群肌（单侧）','鮐骨（人体最大的籽骨）','全身骨骼肌数量','人体最长肌肉（缝妆肌）']],
    ['❤️ 循环系统',['心腔数量','心脏瓣膜数量','心包层数','冠状动脉主干数','主动脉弓分支数','心脏每天卓动次数','全身血液量','红细胞寿命','心脏重量','安静时心率','白细胞分类种数']],
    ['👁️ 感觉器官',['眼球壁层数','听小骨（单侧）','外耳道长度','耳蜗蜗管圈数','大唾液腺对数','味蕾总数','眼球前后径','正常眼压','半规管数量（单侧）','鼓膜面积']],
  ];
  for(const[catName,parts]of cats){

            itemsHtml+='<div class="handbook-item"><span>'+part+'</span><span class="h-val">'+item.normal+(item.unit||'')+'</span></div>';
          }
        }
      }
    }
    div.innerHTML='<h3 onclick="this.parentElement.classList.toggle(\'open\')"><span>'+catName+'</span><span class="hb-toggle">▶</span></h3><div class="hb-items">'+itemsHtml+'</div>';

}

document.getElementById('handbookModal').addEventListener('click',function(e){
  if(e.target===this)this.classList.remove('show');
});

renderHearts();
